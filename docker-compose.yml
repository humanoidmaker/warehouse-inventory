version: "3.8"
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - MONGODB_URI=mongodb://mongo:27017/warehouse_inv
      - JWT_SECRET=dev-secret-key-change-in-production
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on: [mongo]
  frontend-app:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
volumes:
  mongo_data:
